<!DOCTYPE html>
<html lang="{{ site.Language.Locale }}">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ site.Title }}</title>
  <meta name="description" content="{{ site.Params.description }}" />
  <link rel="icon" href="{{ "favicon.svg" | relURL }}" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;0,8..60,700;1,8..60,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  {{ with resources.Get "css/main.css" | minify | fingerprint }}
  <link rel="stylesheet" href="{{ .RelPermalink }}" integrity="{{ .Data.Integrity }}" />
  {{ end }}
</head>
<body>
  <header>
    <nav>
      <a href="#top" class="nav-brand">Shrikanta Paul</a>
      <button class="nav-toggle" aria-label="Menu"><i class="fas fa-bars"></i></button>
      <ul id="navMenu">
        <li><a href="#about">About</a></li>
        <li><a href="#news">News</a></li>
        <li><a href="#publications">Publications</a></li>
        <li><a href="#experience">Experience</a></li>
        <li><a href="#projects">Projects</a></li>
        <li><a href="#awards">Awards</a></li>
        <li><a href="#cv">CV</a></li>
        <li><a href="#contact">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main id="top">
    {{ block "main" . }}{{ end }}
  </main>

  <footer>
    <div class="footer-inner">
      <p>© {{ now.Year }} {{ site.Params.name }} · Built with <a href="https://gohugo.io/" target="_blank" rel="noopener">Hugo</a>, hosted on GitHub Pages</p>
      <div class="footer-socials">
        <a href="mailto:{{ site.Params.email }}" aria-label="Email"><i class="fas fa-envelope"></i></a>
        <a href="{{ site.Params.social.github }}" target="_blank" rel="noopener" aria-label="GitHub"><i class="fab fa-github"></i></a>
        <a href="{{ site.Params.social.linkedin }}" target="_blank" rel="noopener" aria-label="LinkedIn"><i class="fab fa-linkedin-in"></i></a>
        <a href="{{ site.Params.social.facebook }}" target="_blank" rel="noopener" aria-label="Facebook"><i class="fab fa-facebook-f"></i></a>
      </div>
    </div>
  </footer>

  <button class="to-top" id="toTop" aria-label="Back to top"><i class="fas fa-arrow-up"></i></button>

  <script>
    const toggle = document.querySelector(".nav-toggle");
    const menu = document.getElementById("navMenu");
    toggle.addEventListener("click", () => menu.classList.toggle("open"));
    menu.querySelectorAll("a").forEach(a => a.addEventListener("click", () => menu.classList.remove("open")));

    const toTop = document.getElementById("toTop");
    window.addEventListener("scroll", () => {
      toTop.classList.toggle("show", window.scrollY > 500);
      document.querySelector("header").classList.toggle("scrolled", window.scrollY > 10);
    });
    toTop.addEventListener("click", () => window.scrollTo({ top: 0, behavior: "smooth" }));
  </script>
</body>
</html>
